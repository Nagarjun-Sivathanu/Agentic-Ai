<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGBC AI Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>SGBC AI Hub</h2>
                <button class="new-chat" id="new-chat-btn">+ New Chat</button>
            </div>
            <div id="sidebar-history"></div>
            <div class="sidebar-footer">v2.0 · Llama 3.3 70B</div>
        </div>

        <!-- Main Chat -->
        <div class="main-content">
            <header>
                <div class="logo-text">Sudha Gopalakrishnan Brain Centre</div>
                <div class="mode-selector">
                    <span class="mode-label">Mode:</span>
                    <select id="chat-mode">
                        <option value="short">Short & Concise</option>
                        <option value="detailed">Detailed Research</option>
                        <option value="timeline">Timeline & History</option>
                        <option value="integrated">Fully Integrated</option>
                    </select>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="message assistant-message">
                    <div class="avatar assistant-avatar">SG</div>
                    <div class="message-content">
                        Hello! I am the SGBC AI Agent. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Message the AI Engine..." rows="1"
                        oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button id="send-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="footer-text">Powered by IIT Madras · Multi-Tool AI Agent</div>
            </div>
        </div>

        <!-- Insight Side Panel -->
        <div class="insight-panel" id="insight-panel">
            <button class="insight-close" id="insight-close">✕</button>
            <div class="insight-header" id="insight-header">Insight</div>
            <div class="insight-body" id="insight-body">
                <div class="insight-loading">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>
        <div class="insight-overlay" id="insight-overlay"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
